[project]
name = "energy_rvt"
channels = ["conda-forge", "pytorch", "nvidia"]
platforms = ["linux-64"]
channel-priority = "disabled"

[activation]
env = { LD_PRELOAD = "$PIXI_PROJECT_ROOT/.pixi/envs/default/lib/libstdc++.so.6" }

[system-requirements]
libc = "2.28"

[dependencies]
python = "3.8.*"
gcc_linux-64 = "9.*"
gxx_linux-64 = "9.*"
pip = ">=24.3.1,<25"
libxcrypt = ">=4.4.36,<5"

pytorch = "2.1.2"
torchvision = "0.16.2"
torchaudio = "2.1.2"
numpy = "1.24.1"
cffi = "*"
typing-extensions = ">=4.5.0,<4.6.0"

